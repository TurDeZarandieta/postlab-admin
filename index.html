<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostLab · Panel de Moderación</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161616;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #ffffff;
      --text2: #aaaaaa;
      --text3: #555555;
      --accent: #ffffff;
      --accent-text: #0a0a0a;
      --red: #e74c3c;
      --green: #2ecc71;
      --yellow: #f39c12;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── AUTH ── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-box h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .auth-box p {
      color: var(--text3);
      margin-bottom: 28px;
      font-size: 13px;
    }

    input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #444; }

    button {
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: var(--accent-text); width: 100%; }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border2); }

    .error-msg {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    /* ── APP ── */
    #app-screen { display: none; }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    header .logo span { color: var(--text3); font-weight: 400; margin-left: 8px; font-size: 13px; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-badge {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text2);
    }

    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      border: none;
    }

    .tab.active { background: var(--bg3); color: var(--text); }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-card .stat-number { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .stat-card .stat-label  { font-size: 12px; color: var(--text3); margin-top: 4px; }

    /* ── REPORT CARDS ── */
    .report-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .report-card:hover { border-color: var(--border2); }

    .report-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .report-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .badge {
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-type     { background: rgba(255,255,255,0.07); color: var(--text2); }
    .badge-pending  { background: rgba(243,156,18,0.15);  color: var(--yellow); }
    .badge-accepted { background: rgba(46,204,113,0.15);  color: var(--green); }
    .badge-rejected { background: rgba(255,255,255,0.05); color: var(--text3); }

    .badge-reason {
      background: rgba(255,255,255,0.05);
      color: var(--text2);
    }

    .report-time { font-size: 12px; color: var(--text3); white-space: nowrap; }

    .report-body { margin-bottom: 14px; }
    .report-body p { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
    .report-body strong { color: var(--text); }
    .report-details {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
      line-height: 1.5;
    }

    .report-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .report-actions button { font-size: 13px; padding: 8px 14px; }

    .target-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--text3);
      margin-top: 6px;
      word-break: break-all;
    }

    /* ── EMPTY / LOADING ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }

    .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 300px;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: rgba(46,204,113,0.4); }
    #toast.error   { border-color: rgba(231,76,60,0.4); }

    /* ── BAN MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      display: none;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p  { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
    .modal textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      margin-bottom: 16px;
      font-family: inherit;
    }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>PostLab</h1>
    <p>Panel de moderación · Acceso restringido</p>
    <div class="error-msg" id="auth-error"></div>
    <input type="email" id="auth-email" placeholder="Email de administrador" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Contraseña" autocomplete="current-password" />
    <button class="btn-primary" id="auth-btn" onclick="handleLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="logo">PostLab <span>Moderación</span></div>
    <div class="header-right">
      <span class="admin-badge" id="admin-email-badge"></span>
      <button class="btn-ghost" style="padding:8px 14px;font-size:13px" onclick="handleLogout()">Salir</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="stat-pending">—</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-accepted">—</div>
        <div class="stat-label">Aceptados</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-rejected">—</div>
        <div class="stat-label">Rechazados</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending')" id="tab-pending">Pendientes</button>
      <button class="tab" onclick="switchTab('accepted')" id="tab-accepted">Aceptados</button>
      <button class="tab" onclick="switchTab('rejected')" id="tab-rejected">Rechazados</button>
      <button class="tab" onclick="switchTab('bans')" id="tab-bans">Baneados</button>
      <button class="tab" onclick="switchTab('verifications')" id="tab-verifications">Verificaciones</button>
    </div>

    <!-- Content -->
    <div id="content"></div>
  </main>
</div>

<!-- Ban Modal -->
<div class="modal-overlay" id="ban-modal">
  <div class="modal">
    <h2>Banear usuario</h2>
    <p>El usuario recibirá un aviso por email. Esta acción se puede deshacer desde la pestaña Baneados.</p>
    <textarea id="ban-reason" placeholder="Motivo del baneo (opcional)..."></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeBanModal()">Cancelar</button>
      <button class="btn-danger" onclick="confirmBan()">Banear</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const SUPABASE_URL = 'https://yqmobncadayzhkduhnzl.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxbW9ibmNhZGF5emhrZHVobnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjkyNjYsImV4cCI6MjA4OTE0NTI2Nn0.HYyWAc8nbmEnmcj8722ezlarEg8_8mmkT0kq1s8QBJQ'
  const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // ── STATE ────────────────────────────────────────────────
  let currentTab = 'pending'
  let banTargetUserId = null
  let banTargetReportId = null

  const TARGET_LABELS = {
    post: 'Publicación', comment: 'Comentario',
    forum_post: 'Post de foro', forum_comment: 'Comentario de foro', user: 'Perfil'
  }

  const REASON_LABELS = {
    spam: 'Spam', inappropriate: 'Contenido inapropiado',
    harassment: 'Acoso', other: 'Otro'
  }

  // ── AUTH ─────────────────────────────────────────────────
  async function handleLogin() {
    const email = document.getElementById('auth-email').value.trim()
    const password = document.getElementById('auth-password').value
    const btn = document.getElementById('auth-btn')
    const errEl = document.getElementById('auth-error')

    if (!email || !password) { showAuthError('Rellena todos los campos.'); return }

    btn.disabled = true
    btn.textContent = 'Entrando...'
    errEl.style.display = 'none'

    const { data, error } = await sb.auth.signInWithPassword({ email, password })

    if (error) {
      showAuthError('Credenciales incorrectas.')
      btn.disabled = false
      btn.textContent = 'Entrar'
      return
    }

    // Verificar que es admin
    const { data: userData } = await sb
      .from('users')
      .select('role, username')
      .eq('id', data.user.id)
      .single()

    if (!userData || userData.role !== 'admin') {
      showAuthError('No tienes permisos de administrador.')
      await sb.auth.signOut()
      btn.disabled = false
      btn.textContent = 'Entrar'
      return
    }

    showApp(data.user.email)
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error')
    el.textContent = msg
    el.style.display = 'block'
  }

  async function handleLogout() {
    await sb.auth.signOut()
    document.getElementById('app-screen').style.display = 'none'
    document.getElementById('auth-screen').style.display = 'flex'
    document.getElementById('auth-email').value = ''
    document.getElementById('auth-password').value = ''
    document.getElementById('auth-btn').disabled = false
    document.getElementById('auth-btn').textContent = 'Entrar'
  }

  function showApp(email) {
    document.getElementById('auth-screen').style.display = 'none'
    document.getElementById('app-screen').style.display = 'block'
    document.getElementById('admin-email-badge').textContent = email
    loadStats()
    loadTab('pending')
  }

  // ── INIT: check existing session ────────────────────────
  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) return
    const { data: userData } = await sb
      .from('users').select('role').eq('id', session.user.id).single()
    if (userData?.role === 'admin') showApp(session.user.email)
  })

  // ── STATS ────────────────────────────────────────────────
  async function loadStats() {
    const statuses = ['pending', 'accepted', 'rejected']
    for (const s of statuses) {
      const { count } = await sb
        .from('reports').select('*', { count: 'exact', head: true }).eq('status', s)
      document.getElementById(`stat-${s}`).textContent = count ?? 0
    }
  }

  // ── TABS ─────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.getElementById(`tab-${tab}`).classList.add('active')
    loadTab(tab)
  }

  async function loadTab(tab) {
    const content = document.getElementById('content')
    content.innerHTML = '<div class="loading">Cargando...</div>'

    if (tab === 'bans') { loadBans(); return }
    if (tab === 'verifications') { loadVerifications(); return }

    const { data, error } = await sb
      .from('reports')
      .select('*, reporter:users!reports_reporter_id_fkey(id, username)')
      .eq('status', tab)
      .order('created_at', { ascending: tab === 'pending' })
      .limit(100)

    if (error) { content.innerHTML = `<div class="empty"><p>Error: ${error.message}</p></div>`; return }
    if (!data || data.length === 0) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">${tab === 'pending' ? '✓' : '📋'}</div><p>${tab === 'pending' ? 'No hay reportes pendientes' : 'Sin registros'}</p></div>`
      return
    }

    content.innerHTML = data.map(r => renderReportCard(r)).join('')
  }

  function renderReportCard(r) {
    const isPending = r.status === 'pending'
    const date = new Date(r.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
    const resolvedDate = r.resolved_at ? new Date(r.resolved_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) : null

    return `
      <div class="report-card" id="report-${r.id}">
        <div class="report-header">
          <div class="report-meta">
            <span class="badge badge-type">${TARGET_LABELS[r.target_type] ?? r.target_type}</span>
            <span class="badge badge-reason">${REASON_LABELS[r.reason] ?? r.reason}</span>
            <span class="badge badge-${r.status}">${r.status === 'pending' ? 'Pendiente' : r.status === 'accepted' ? 'Aceptado' : 'Rechazado'}</span>
          </div>
          <span class="report-time">${date}</span>
        </div>

        <div class="report-body">
          <p>Reportado por <strong>${r.reporter?.username ?? '—'}</strong></p>
          <div class="target-id">ID del contenido: ${r.target_id}</div>
          ${r.details ? `<div class="report-details">"${r.details}"</div>` : ''}
          ${resolvedDate ? `<p style="margin-top:8px;font-size:12px;color:var(--text3)">Resuelto el ${resolvedDate}</p>` : ''}
        </div>

        ${isPending ? `
          <div class="report-actions">
            <button class="btn-success" onclick="resolveReport('${r.id}', 'accepted', false)">✓ Aceptar</button>
            <button class="btn-success" style="background:rgba(46,204,113,0.15);color:var(--green)" onclick="resolveReport('${r.id}', 'accepted', true)">✓ Aceptar y eliminar</button>
            <button class="btn-ghost" onclick="resolveReport('${r.id}', 'rejected', false)">✗ Rechazar</button>
            ${r.target_type !== 'user'
              ? `<button class="btn-danger" style="background:transparent;color:var(--red);border:1px solid rgba(231,76,60,0.3)" onclick="openBanModal(null, '${r.id}')">Banear usuario</button>`
              : `<button class="btn-danger" style="background:transparent;color:var(--red);border:1px solid rgba(231,76,60,0.3)" onclick="openBanModal('${r.target_id}', '${r.id}')">Banear este usuario</button>`
            }
          </div>
        ` : ''}
      </div>
    `
  }

  // ── RESOLVE ──────────────────────────────────────────────
  async function resolveReport(reportId, status, deleteContent) {
    const label = status === 'accepted'
      ? (deleteContent ? 'aceptar y eliminar contenido' : 'aceptar')
      : 'rechazar'

    if (!confirm(`¿Seguro que quieres ${label} este reporte?`)) return

    const { error } = await sb.rpc('resolve_report', {
      p_report_id: reportId,
      p_status: status,
      p_delete_content: deleteContent,
    })

    if (error) { showToast('Error: ' + error.message, 'error'); return }

    // Llamar Edge Function para notificar
    try {
      const { data: { session } } = await sb.auth.getSession()
      await fetch(`${FUNCTIONS_URL}/notify-report-resolved`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ report_id: reportId }),
      })
    } catch (e) {
      console.warn('Notificación no enviada:', e)
    }

    showToast(status === 'accepted' ? 'Reporte aceptado' : 'Reporte rechazado', 'success')
    loadStats()
    loadTab(currentTab)
  }

  // ── BANS ─────────────────────────────────────────────────
  function openBanModal(userId, reportId) {
    banTargetUserId = userId
    banTargetReportId = reportId
    document.getElementById('ban-reason').value = ''
    document.getElementById('ban-modal').classList.add('show')
  }

  function closeBanModal() {
    document.getElementById('ban-modal').classList.remove('show')
    banTargetUserId = null
    banTargetReportId = null
  }

  async function confirmBan() {
    const reason = document.getElementById('ban-reason').value.trim()

    // Si no tenemos userId, obtenerlo del reporte
    let userId = banTargetUserId
    if (!userId && banTargetReportId) {
      const { data: report } = await sb.from('reports').select('target_id, target_type').eq('id', banTargetReportId).single()
      if (report) {
        if (report.target_type === 'user') {
          userId = report.target_id
        } else {
          const tableMap = { post: 'posts', comment: 'comments', forum_post: 'forum_posts', forum_comment: 'forum_comments' }
          const table = tableMap[report.target_type]
          if (table) {
            const { data: content } = await sb.from(table).select('user_id').eq('id', report.target_id).maybeSingle()
            userId = content?.user_id
          }
        }
      }
    }

    if (!userId) { showToast('No se pudo identificar al usuario', 'error'); return }

    const { error } = await sb.rpc('ban_user', {
      p_user_id: userId,
      p_reason: reason || null,
      p_report_id: banTargetReportId || null,
    })

    if (error) { showToast('Error: ' + error.message, 'error'); closeBanModal(); return }

    showToast('Usuario baneado', 'success')
    closeBanModal()
    loadTab(currentTab)
    if (currentTab === 'bans') loadBans()
  }

  async function loadBans() {
    const content = document.getElementById('content')

    const { data, error } = await sb
      .from('bans')
      .select('*, user:users!bans_user_id_fkey(id, username)')
      .order('created_at', { ascending: false })

    if (error) { content.innerHTML = `<div class="empty"><p>Error: ${error.message}</p></div>`; return }
    if (!data || data.length === 0) {
      content.innerHTML = '<div class="empty"><div class="empty-icon">🚫</div><p>No hay usuarios baneados</p></div>'
      return
    }

    content.innerHTML = data.map(b => {
      const date = new Date(b.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' })
      return `
        <div class="report-card">
          <div class="report-header">
            <div class="report-meta">
              <span class="badge badge-type">@${b.user?.username ?? '—'}</span>
            </div>
            <span class="report-time">${date}</span>
          </div>
          <div class="report-body">
            ${b.reason ? `<div class="report-details">${b.reason}</div>` : '<p style="color:var(--text3)">Sin motivo especificado</p>'}
          </div>
          <div class="report-actions">
            <button class="btn-ghost" onclick="unbanUser('${b.user_id}', '${b.user?.username}')">Desbanear</button>
          </div>
        </div>
      `
    }).join('')
  }

  async function unbanUser(userId, username) {
    if (!confirm(`¿Desbanear a @${username}?`)) return
    const { error } = await sb.rpc('unban_user', { p_user_id: userId })
    if (error) { showToast('Error: ' + error.message, 'error'); return }
    showToast('Usuario desbaneado', 'success')
    loadBans()
  }

  // ── VERIFICATIONS ────────────────────────────────────────
  async function loadVerifications() {
    const content = document.getElementById('content')

    const { data, error } = await sb
      .from('forum_verification_requests')
      .select(`
        *,
        forum:forums!forum_verification_requests_forum_id_fkey(id, name, is_news, is_verified),
        requester:users!forum_verification_requests_requested_by_fkey(id, username)
      `)
      .order('created_at', { ascending: true })
      .limit(100)

    if (error) { content.innerHTML = `<div class="empty"><p>Error: ${error.message}</p></div>`; return }
    if (!data || data.length === 0) {
      content.innerHTML = '<div class="empty"><div class="empty-icon">✓</div><p>No hay solicitudes de verificación</p></div>'
      return
    }

    // Obtener emails de auth.users para cada solicitante
    const verifications = await Promise.all(data.map(async (v) => {
      // Obtenemos el email buscando en la tabla de reportes o directamente
      return v
    }))

    content.innerHTML = data.map(v => renderVerificationCard(v)).join('')
  }

  function renderVerificationCard(v) {
    const isPending = v.status === 'pending'
    const date = new Date(v.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
    const resolvedDate = v.resolved_at ? new Date(v.resolved_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) : null

    const statusLabel = v.status === 'pending' ? 'Pendiente' : v.status === 'accepted' ? 'Aceptada' : 'Rechazada'

    return `
      <div class="report-card" id="verification-${v.id}">
        <div class="report-header">
          <div class="report-meta">
            <span class="badge badge-type">${v.forum?.name ?? '—'}</span>
            ${v.forum?.is_news ? '<span class="badge badge-reason">Noticias</span>' : ''}
            ${v.forum?.is_verified ? '<span class="badge badge-accepted">Verificado</span>' : ''}
            <span class="badge badge-${v.status}">${statusLabel}</span>
          </div>
          <span class="report-time">${date}</span>
        </div>

        <div class="report-body">
          <p>Solicitado por <strong>${v.requester?.username ?? '—'}</strong></p>
          <div class="target-id">Forum ID: ${v.forum_id}</div>
          ${v.reason ? `<div class="report-details">${v.reason}</div>` : ''}
          ${resolvedDate ? `<p style="margin-top:8px;font-size:12px;color:var(--text3)">Resuelto el ${resolvedDate}</p>` : ''}
        </div>

        ${isPending ? `
          <div class="report-actions">
            <button class="btn-success" onclick="resolveVerification('${v.id}', 'accepted')">✓ Verificar foro</button>
            <button class="btn-ghost" onclick="resolveVerification('${v.id}', 'rejected')">✗ Rechazar</button>
            <button class="btn-ghost" style="border-color:rgba(255,255,255,0.2)" onclick="contactRequester('${v.forum_id}', '${v.requested_by}')">✉ Contactar</button>
          </div>
        ` : `
          <div class="report-actions">
            <button class="btn-ghost" style="border-color:rgba(255,255,255,0.2)" onclick="contactRequester('${v.forum_id}', '${v.requested_by}')">✉ Contactar</button>
          </div>
        `}
      </div>
    `
  }

  async function resolveVerification(requestId, status) {
    const label = status === 'accepted' ? 'verificar este foro' : 'rechazar esta solicitud'
    if (!confirm(`¿Seguro que quieres ${label}?`)) return

    const { error } = await sb.rpc('resolve_verification_request', {
      p_request_id: requestId,
      p_status: status,
    })

    if (error) { showToast('Error: ' + error.message, 'error'); return }

    showToast(status === 'accepted' ? 'Foro verificado ✓' : 'Solicitud rechazada', 'success')
    loadVerifications()
  }

  async function contactRequester(forumId, requestedBy) {
    // Obtener el email del solicitante a través de sus reportes o directamente
    // Como no tenemos acceso directo a auth.users desde el cliente,
    // buscamos en la tabla users el username y mostramos instrucciones
    const { data: userData } = await sb
      .from('users')
      .select('username')
      .eq('id', requestedBy)
      .single()

    const username = userData?.username ?? '—'

    // Abrir cliente de email — el admin tendrá que buscar el email en Supabase Auth
    const subject = encodeURIComponent(`PostLab — Solicitud de verificación de foro`)
    const body = encodeURIComponent(`Hola ${username},\n\nNos ponemos en contacto contigo en relación a la solicitud de verificación del foro (ID: ${forumId}).\n\n`)

    // Intentar abrir mailto — si el admin necesita el email exacto, debe buscarlo en Supabase Auth Dashboard
    const mailtoLink = `mailto:?subject=${subject}&body=${body}`
    window.open(mailtoLink, '_blank')

    showToast(`Abre tu cliente de email. Busca el email de @${username} en Supabase Auth → Users`, 'success')
  }

  // ── TOAST ────────────────────────────────────────────────
  let toastTimer = null
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.className = `show ${type}`
    if (toastTimer) clearTimeout(toastTimer)
    toastTimer = setTimeout(() => { el.className = '' }, 3000)
  }

  // ── ENTER KEY en login ───────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') {
      handleLogin()
    }
  })
</script>
</body>
